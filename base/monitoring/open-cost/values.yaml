loglevel: info

opencost:
  nodeNameMapping:
    "10.17.0.103": "datentraum-agent-large-sed"
    "10.17.0.101": "datentraum-agent-large-iqm"
    "10.17.0.102": "datentraum-agent-large-iie"
    "10.31.240.101": "datentraum-control-plane-fsn1-ffk"

  loadBalancerCostEnabled: false

  mcp:
    enabled: false

  customPricing:
    enabled: true
    provider: custom
    costModel:
      description: "Hetzner on-prem pricing"
      CPU: "0.001322"       # €0.00161 per CPU hour
      spotCPU: "0.001322"   # Same as CPU (no spot instances)
      RAM: "0.000661"       # €0.00054 per GB RAM hour
      spotRAM: "0.000661"   # Same as RAM
      GPU: "0"
      storage: "0.000015"
      zoneNetworkEgress: "0"
      regionNetworkEgress: "0"
      internetNetworkEgress: "0"

  prometheus:
    external:
      enabled: true
      url: "http://kube-prometheus-stack-prometheus.monitoring:9090"
    internal:
      enabled: false
    amp:
      enabled: false

  ui:
    enabled: true
