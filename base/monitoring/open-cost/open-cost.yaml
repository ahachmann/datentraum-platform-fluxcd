---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: open-cost
spec:
  interval: 1m0s
  url: https://opencost.github.io/opencost-helm-chart
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-cost
spec:
  chart:
    spec:
      chart: opencost
      interval: 5m
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: open-cost
      version: 2.5.12
  install:
    remediation:
      retries: 3
  interval: 5m
  releaseName: open-cost
  timeout: 6m
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: open-cost-values