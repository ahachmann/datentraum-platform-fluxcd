kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: wawi-oauth
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ${DOMAIN}
      secretName: ${TLS_SECRET_NAME}
  rules:
    - host: ${DOMAIN}
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
