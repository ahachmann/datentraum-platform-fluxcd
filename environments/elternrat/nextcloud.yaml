---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cvo-elternrat-cloud
  namespace: cvo-elternrat-cloud
spec:
  interval: 10m0s
  targetNamespace: ${TARGET_NAMESPACE}
  path: ./applications/nextcloud
  prune: true
  sourceRef:
    kind: GitRepository
    name: datentraum-platform-fluxcd
  postBuild:
    substitute:
      FLUX_NAMESPACE: flux-system
      TARGET_NAMESPACE: cvo-elternrat-cloud
      TLS_SECRET_NAME: cvo-elternrat-cloud-general-tls
      DOMAIN: cloud.cvo-elternrat.de
      CLUSTER_ISSUER: letsencrypt-prod
      STORAGE_CLASS_NAME: hcloud-volumes