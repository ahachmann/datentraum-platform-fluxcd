---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cvo-elternrat-collabora
  namespace: cvo-elternrat-cloud
spec:
  interval: 10m0s
  targetNamespace: ${TARGET_NAMESPACE}
  path: ./applications/collabora
  prune: true
  sourceRef:
    kind: GitRepository
    name: datentraum-platform-fluxcd
  postBuild:
    substitute:
      TARGET_NAMESPACE: cvo-elternrat-cloud
      TLS_SECRET_NAME: collabora-nextcloud-general-tls
      DOMAIN: code.cvo-elternrat.de
      CLUSTER_ISSUER: letsencrypt-prod
      