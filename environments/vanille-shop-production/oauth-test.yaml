---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: oauth-test
  namespace: ${FLUX_NAMESPACE}
spec:
  interval: 10m0s
  targetNamespace: iam
  path: ./base/security/oauth2-proxy
  prune: true
  sourceRef:
    kind: GitRepository
    name: datentraum-platform-fluxcd
  postBuild:
    substitute:
      ISSUER: https://iam.vanille.hamburg/realms/VanilleShop
      CLIENT_SECRET_ITEM_PATH: "vaults/VS-Infra/items/OAuth Client Secret"
      DOMAIN: wawi.vanille.hamburg
      TLS_SECRET_NAME: wawi-general-tls
