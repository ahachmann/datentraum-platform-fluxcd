---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: oauth-test
  namespace: vanille-shop-flux
spec:
  interval: 10m0s
  targetNamespace: iam
  path: ./base/security/kuard
  prune: true
  sourceRef:
    kind: GitRepository
    name: datentraum-platform-fluxcd
  postBuild:
    substitute:
      DOMAIN: kuard.vanille.hamburg
      INGRESS: traefik
      CLUSTER_ISSUER: letsencrypt-prod