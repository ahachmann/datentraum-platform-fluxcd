apiVersion: v1
kind: Namespace
metadata:
  name: cloudnative-pg
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-requests
  namespace: cloudnative-pg
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: operators
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./hetzner-k8s-dt-01/operators
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
