---
apiVersion: v1
kind: Namespace
metadata:
  name: iam
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-requests
  namespace: iam
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: iam
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: iam
  path: ./base/security/keycloak
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      DOMAIN: iam.hachmann.hamburg
      INGRESS: traefik
      CLUSTER_ISSUER: letsencrypt-prod
      DATABASE_SECRET_ID: "vaults/DT-Infra/items/KeyCloak Database User"
      ADMIN_SECRET_ID: "vaults/DT-Infra/items/KeyCloak Admin (Hachmann)"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: iam-theme
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: iam
  path: ./base/security/keycloak/keycloak-theme
  prune: true
  dependsOn:
    - name: iam
  sourceRef:
    kind: GitRepository
    name: flux-system
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: er-keycloak-ingress
  namespace: iam
  labels:
    kustomize.toolkit.fluxcd.io/name: iam
    kustomize.toolkit.fluxcd.io/namespace: flux-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - iam.cvo-elternrat.de
      secretName: er-keycloak-general-tls
  rules:
    - host: iam.cvo-elternrat.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
