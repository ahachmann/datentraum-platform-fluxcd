---
apiVersion: v1
kind: Namespace
metadata:
  name: open-cost
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-requests
  namespace: open-cost
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: open-cost
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: open-cost
  path: ./base/monitoring/open-cost
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      DOMAIN: cloud-costs.hachmann.hamburg
      INGRESS: traefik
      CLUSTER_ISSUER: letsencrypt-prod