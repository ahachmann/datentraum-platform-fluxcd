---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: collabora
spec:
  interval: 1m0s
  url: https://collaboraonline.github.io/online/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: collabora
spec:
  targetNamespace: ${TARGET_NAMESPACE}
  chart:
    spec:
      chart: collabora-online
      interval: 5m
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: collabora
      version: 1.1.60 
  install:
    remediation:
      retries: 3
  interval: 5m
  releaseName: collabora
  test:
    enable: false
  # this take potentially long time depending on the number of nodes
  timeout: 6m
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: collabora-values
