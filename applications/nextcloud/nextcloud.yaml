---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nextcloud
spec:
  interval: 1m0s
  url: https://nextcloud.github.io/helm/ 
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  targetNamespace: ${TARGET_NAMESPACE}
  chart:
    spec:
      chart: nextcloud
      interval: 5m
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: nextcloud
      version: 9.0.3
  install:
    remediation:
      retries: 3
  interval: 5m
  releaseName: vanille-shop-nextcloud
  test:
    enable: false
  # this take potentially long time depending on the number of nodes
  timeout: 3m
  upgrade:
    remediation:
      retries: 3
  # https://github.com/nextcloud/helm/blob/main/charts/nextcloud/values.yaml
  valuesFrom:
    - kind: ConfigMap
      name: nextcloud-values
