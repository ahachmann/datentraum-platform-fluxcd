
---
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
  name: vs-nextcloud-data-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb
  mountOptions:
    - dir_mode=0770
    - file_mode=0660
    - uid=33
    - gid=33
  csi:
    driver: smb.csi.k8s.io
    # volumeHandle format: {smb-server-address}#{sub-dir-name}#{share-name}
    # make sure this value is unique for every share in the cluster
    volumeHandle: smb-server.${TARGET_NAMESPACE}.svc.cluster.local/nextcloud-data##
    volumeAttributes:
      source: //u566750-sub1.your-storagebox.de/u566750-sub1/nextcloud-data
    nodeStageSecretRef:
      name: vs-document-test-smb
      namespace: ${TARGET_NAMESPACE}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vs-nextcloud-data-pvc
spec:
  storageClassName: smb
  volumeName: vs-nextcloud-data-pv
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
