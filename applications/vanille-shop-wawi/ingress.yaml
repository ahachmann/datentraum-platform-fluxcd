apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: ${CLUSTER_ISSUER}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: iam-oauth-errors@kubernetescrd,iam-oauth-auth@kubernetescrd,${TARGET_NAMESPACE}-sticky@kubernetescrd,${TARGET_NAMESPACE}-cors@kubernetescrd,${TARGET_NAMESPACE}-buffering@kubernetescrd
  name: wawi
spec:
  rules:
  - host: wawi.vanille-shop.de
    http:
      paths:
      - backend:
          service:
            name: wawi
            port:
              number: 9080
        path: /.*
        pathType: Prefix
  tls:
  - hosts:
    - wawi.vanille-shop.de
    secretName: wawi-vanilleshop-tls
