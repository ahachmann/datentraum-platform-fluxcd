---
apiVersion: v1
kind: Namespace
metadata:
  name: elternrat-cloud
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-requests
  namespace: elternrat-cloud
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: elternrat-cloud
  namespace: flux-system
spec:
  interval: 10m0s
  targetNamespace: elternrat-cloud
  path: ./applications/nextcloud
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      FLUX_NAMESPACE: elternrat-cloud
      TARGET_NAMESPACE: elternrat-cloud
      TLS_SECRET_NAME: elternrat-general-tls
      DOMAIN: er.hachmann.hamburg
      CLUSTER_ISSUER: letsencrypt-prod
      STORAGE_CLASS_NAME: hcloud-volumes