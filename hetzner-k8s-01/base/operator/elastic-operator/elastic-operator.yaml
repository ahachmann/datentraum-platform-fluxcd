---
apiVersion: v1
kind: Namespace
metadata:
  name: elastic-system
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-requests
  namespace: elastic-system
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: elastic-operator
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://helm.elastic.co
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: elastic-operator
  namespace: flux-system
spec:
  targetNamespace: elastic-system
  chart:
    spec:
      chart: eck-operator
      interval: 5m
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: elastic-operator
      version: 2.16.1
  install:
    remediation:
      retries: 3
  interval: 10m
  releaseName: elastic-operator
  test:
    enable: false
  timeout: 5m
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1
