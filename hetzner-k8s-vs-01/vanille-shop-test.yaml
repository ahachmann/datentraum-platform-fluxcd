---
apiVersion: v1
kind: Namespace
metadata:
  name: vanille-shop-flux
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-requests
  namespace: vanille-shop-flux
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
---
apiVersion: v1
kind: Namespace
metadata:
  name: vanille-shop-test
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-requests
  namespace: vanille-shop-test
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vanille-shop-test
  namespace: vanille-shop-flux
spec:
  interval: 10m0s
  path: ./environments/vanille-shop-test
  prune: true
  sourceRef:
    kind: GitRepository
    name: datentraum-platform-fluxcd
  postBuild:
    substitute:
      TARGET_NAMESPACE: vanille-shop-test
      FLUX_NAMESPACE: vanille-shop-flux 