apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/storage/smb-csi-driver
  - ../base/security/cert-manager
  - ../base/networking/dns-manager
  - ../base/monitoring/prometheus-stack
  - ../base/operator/cnpg
  - git-repo.yaml
  - pg-cluster-01.yaml
  - iam.yaml
#  - nextcloud.yaml
  - vanille-shop-test.yaml
patches:
  - target:
      kind: OnePasswordItem
      name: hetzner-credentials
      namespace: external-dns
    patch: |-
      - op: replace
        path: /spec/itemPath
        value: "vaults/VS-Infra/items/hetzner-api-key"
  - target:
      kind: OnePasswordItem
      name: storagebox-test-smb-creds
      namespace: kube-system
    patch: |-
      - op: replace
        path: /spec/itemPath
        value: "vaults/VS-Infra/items/VS Document Test SMB"
  - target:
      kind: StorageClass
      name: storagebox-test-smb-sc
      namespace: kube-system
    patch: |-
      - op: replace
        path: /parameters/source
        value: "//u566750.your-storagebox.de/u566750-sub1"
  - target: 
      kind: HelmRelease
      name: kube-prometheus-stack
    patch: |-
      - op: add
        path: /spec/values
        value:
          grafana:
            ingress:
              enabled: true
              ingressClassName: traefik 
              annotations: 
                cert-manager.io/cluster-issuer: "letsencrypt-prod"
              labels: {}
              hosts: 
                - grafana.vanille.hamburg
              path: /
              tls: 
                - secretName: grafana-general-tls
                  hosts:
                    - grafana.vanille.hamburg
