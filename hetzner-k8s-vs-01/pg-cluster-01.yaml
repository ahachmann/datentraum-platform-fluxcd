---
apiVersion: v1
kind: Namespace
metadata:
  name: pg-cluster
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: pg-backup-s3-key-secret
  namespace: pg-cluster
spec:
  itemPath: "vaults/VS-Infra/items/PG Backup S3 Secrets"
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: hetzner-s3-store
  namespace: pg-cluster
spec:
  configuration:
    destinationPath: s3://wh-gmbh-pg-backup/20260308
    endpointURL: https://fsn1.your-objectstorage.com
    s3Credentials:
      accessKeyId:
        name: pg-backup-s3-key-secret
        key: AccessKey
      secretAccessKey:
        name: pg-backup-s3-key-secret
        key: SecretKey
    wal:
      compression: gzip
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pg-cluster
  namespace: flux-system
spec:
  targetNamespace: pg-cluster
  interval: 10m0s
  path: ./base/pg-clusters
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  patches:
    - patch: |-
        - op: replace
          path: /spec/plugins
          value:
            - name: barman-cloud.cloudnative-pg.io
              isWALArchiver: true
              parameters:
                barmanObjectName: hetzner-s3-store
      target:
        kind: Cluster
        name: pg-cluster-01
        namespace: pg-cluster

