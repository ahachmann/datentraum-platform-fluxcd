---
apiVersion: v1
kind: Namespace
metadata:
  name: vanille-shop-cloud
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vanille-shop-cloud
  namespace: vanille-shop-flux
spec:
  interval: 10m0s
  targetNamespace: vanille-shop-cloud
  path: ./applications/nextcloud
  prune: true
  sourceRef:
    kind: GitRepository
    name: datentraum-platform-fluxcd
  postBuild:
    substitute:
      FLUX_NAMESPACE: vanille-shop-flux
      TARGET_NAMESPACE: vanille-shop-cloud
      TLS_SECRET_NAME: nextcloud-general-tls
      DOMAIN: cloud.vanille.hamburg
      CLUSTER_ISSUER: letsencrypt-staging